<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sign Up – SQL Playground</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/responsive-full.css') }}">
</head>
<body class="terminal-bg">
<div class="terminal-center">
<div class="terminal-card" style="max-width:400px;">
  <div class="terminal-title">&#x25A0; CREATE USER</div>
  {% if error %}
  <div class="terminal-error">&#x25B6; {{ error }}</div>
  {% endif %}
  <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
    <label for="email" class="terminal-label">&#x25B6; EMAIL:</label>
    <input type="email" id="email" name="email" class="terminal-input"
           placeholder="user@database.com" required autofocus
           value="{{ email | default('') | e }}">
    <label for="password" class="terminal-label">&#x25B6; PASSWORD:</label>
    <input type="password" id="password" name="password" class="terminal-input"
           placeholder="••••••••" required minlength="8">
    <button type="submit" class="terminal-button">EXECUTE SIGNUP</button>
  </form>
  <p class="terminal-signup-link">Already have an account? <a href="{{ url_for('auth.login') }}">LOGIN</a></p>
</div>
</div>
</body>
</html>
