<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Practice Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-bg">

    <!-- ── Navbar ── -->
    <nav class="dash-nav">
        <span class="dash-nav-brand">&#x25A0; SQL Playground</span>
        <div class="profile-menu-wrapper">
            <button class="profile-avatar-btn" id="avatarBtn" aria-label="Profile menu" aria-expanded="false">
                {% if user.picture %}
                    <img src="{{ user.picture }}" alt="Avatar" class="profile-avatar-img">
                {% else %}
                    <span class="profile-avatar-initials">{{ display_name[0] | upper }}</span>
                {% endif %}
            </button>
            <div class="profile-dropdown" id="profileDropdown" role="menu">
                <a href="{{ url_for('profile.profile') }}" class="profile-dropdown-item" role="menuitem">
                    <span>&#x1F464;</span> Profile
                </a>
                <a href="{{ url_for('auth.logout') }}" class="profile-dropdown-item profile-dropdown-logout" role="menuitem">
                    <span>&#x23FB;</span> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- ── Greeting popup bubble ── -->
    <div class="greeting-bubble" id="greetingBubble" aria-live="polite">
        Hi {{ display_name }} &#x1F44B; Ready to practice SQL?
    </div>

    <!-- ── Main content ── -->
    <main class="dash-main">
        <div class="dash-card fade-in">
            <div class="dash-welcome">Welcome {{ display_name }} &#x1F44B;</div>
            <div class="dash-subtitle">Welcome to SQL Playground</div>
            <a href="{{ url_for('editor.editor') }}" class="dash-editor-btn">
                &#x25B6; Open SQL Editor
            </a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='dashboard.js') }}" data-username="{{ display_name | e }}"></script>
</body>
</html>
