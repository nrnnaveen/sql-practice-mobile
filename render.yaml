services:
  - type: web
    name: sql-practice-mobile
    env: python
    plan: free
    buildCommand: 'pip install -r requirements.txt'
    startCommand: 'gunicorn "app:create_app()"'
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
